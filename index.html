<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PC28 前端精英系统 v4.1 - 完全离线版</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: 'Courier New', Courier, monospace;
            background: linear-gradient(135deg, #0a0e27 0%, #1a1f3a 100%);
            color: #e5e7eb;
            padding: 20px;
            min-height: 100vh;
        }

        .container {
            max-width: 1600px;
            margin: 0 auto;
        }

        header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            padding: 30px;
            border-radius: 12px;
            margin-bottom: 30px;
            box-shadow: 0 10px 30px rgba(102, 126, 234, 0.3);
        }

        h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
        }

        .subtitle {
            color: rgba(255, 255, 255, 0.8);
            font-size: 1em;
        }

        .status-bar {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
            margin-bottom: 30px;
        }

        .status-item {
            background: rgba(30, 41, 59, 0.9);
            border: 1px solid rgba(102, 126, 234, 0.3);
            padding: 15px;
            border-radius: 8px;
            backdrop-filter: blur(10px);
        }

        .status-label {
            color: #9ca3af;
            font-size: 0.85em;
            margin-bottom: 5px;
        }

        .status-value {
            font-size: 1.3em;
            color: #4ade80;
            font-weight: bold;
        }

        .status-indicator {
            display: inline-block;
            width: 12px;
            height: 12px;
            border-radius: 50%;
            margin-right: 8px;
        }

        .status-indicator.online {
            background: #4ade80;
            box-shadow: 0 0 10px #4ade80;
        }

        .status-indicator.offline {
            background: #ef4444;
            box-shadow: 0 0 10px #ef4444;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(400px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .card {
            background: rgba(30, 41, 59, 0.9);
            border: 1px solid rgba(102, 126, 234, 0.3);
            border-radius: 8px;
            padding: 20px;
            backdrop-filter: blur(10px);
            transition: all 0.3s;
        }

        .card:hover {
            border-color: rgba(102, 126, 234, 0.6);
            box-shadow: 0 8px 20px rgba(102, 126, 234, 0.2);
        }

        .card-title {
            font-size: 1.3em;
            margin-bottom: 15px;
            padding-bottom: 10px;
            border-bottom: 2px solid #667eea;
            color: #60a5fa;
        }

        .card-content {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .number-ball {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 50px;
            height: 50px;
            border-radius: 50%;
            background: linear-gradient(135deg, #667eea, #764ba2);
            font-weight: bold;
            font-size: 1.2em;
            margin: 5px;
            box-shadow: 0 4px 15px rgba(102, 126, 234, 0.3);
        }

        .prediction-row {
            background: rgba(50, 60, 90, 0.5);
            padding: 12px;
            border-radius: 6px;
            margin: 8px 0;
            border-left: 3px solid #667eea;
        }

        button {
            padding: 12px 20px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.3s;
            font-size: 0.95em;
        }

        button:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(102, 126, 234, 0.4);
        }

        button:active:not(:disabled) {
            transform: translateY(0);
        }

        button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .button-group {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            margin-top: 15px;
        }

        .loading {
            text-align: center;
            padding: 30px;
            color: #9ca3af;
        }

        .spinner {
            border: 3px solid rgba(102, 126, 234, 0.2);
            border-top: 3px solid #667eea;
            border-radius: 50%;
            width: 50px;
            height: 50px;
            animation: spin 1s linear infinite;
            margin: 0 auto 15px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .info-box {
            background: rgba(59, 130, 246, 0.1);
            border-left: 3px solid #3b82f6;
            padding: 12px;
            border-radius: 4px;
            font-size: 0.9em;
            color: #93c5fd;
            margin: 10px 0;
        }

        .success {
            background: rgba(34, 197, 94, 0.1);
            border-left-color: #22c55e;
            color: #4ade80;
        }

        .error {
            background: rgba(239, 68, 68, 0.1);
            border-left-color: #ef4444;
            color: #fca5a5;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 10px;
            font-size: 0.9em;
        }

        th, td {
            padding: 10px;
            text-align: left;
            border-bottom: 1px solid rgba(102, 126, 234, 0.2);
        }

        th {
            background: rgba(102, 126, 234, 0.1);
            font-weight: bold;
        }

        tbody tr:hover {
            background: rgba(102, 126, 234, 0.05);
        }

        .highlight {
            color: #60a5fa;
            font-weight: bold;
        }

        .hidden {
            display: none !important;
        }

        #file-input {
            display: none;
        }

        @media (max-width: 768px) {
            .grid {
                grid-template-columns: 1fr;
            }
            h1 {
                font-size: 1.8em;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>PC28 前端精英系统 v4.1</h1>
            <p class="subtitle">完全离线版 - IndexedDB持久化 - Web Worker并行计算 - Service Worker离线支持</p>
        </header>

        <!-- 状态栏 -->
        <div class="status-bar">
            <div class="status-item">
                <div class="status-label">
                    <span class="status-indicator" id="online-indicator"></span>
                    网络状态
                </div>
                <div class="status-value" id="online-status">检测中...</div>
            </div>
            <div class="status-item">
                <div class="status-label">系统运行时间</div>
                <div class="status-value" id="uptime">0秒</div>
            </div>
            <div class="status-item">
                <div class="status-label">数据库大小</div>
                <div class="status-value" id="db-size">计算中...</div>
            </div>
            <div class="status-item">
                <div class="status-label">预测模式</div>
                <div class="status-value" id="prediction-count">0个</div>
            </div>
        </div>

        <!-- 控制面板 -->
        <div class="card" style="margin-bottom: 30px;">
            <div class="card-title">系统控制</div>
            <div class="button-group">
                <button id="btn-init" onclick="handleAction('init', app.initialize.bind(app))">初始化系统</button>
                <button id="btn-fetch" onclick="handleAction('fetch', app.fetchDrawData.bind(app))">刷新数据</button>
                <button id="btn-predict" onclick="handleAction('predict', app.getComprehensivePrediction.bind(app))">获取预测</button>
                <button id="btn-stats" onclick="handleAction('stats', renderStats)">查看统计</button>
                <button id="btn-export" onclick="handleAction('export', app.exportData.bind(app))">导出备份</button>
                <button id="btn-import" onclick="document.getElementById('file-input').click()">导入备份</button>
                <button id="btn-clear" onclick="handleAction('clear', clearAllData)">清空数据</button>
                <button onclick="clearUI()">清空界面</button>
            </div>
            <input type="file" id="file-input" accept=".json" />
            <div id="system-message" style="margin-top: 15px;"></div>
        </div>

        <!-- 预测结果 -->
        <div class="grid">
            <!-- 特码预测 -->
            <div class="card">
                <div class="card-title">特码预测</div>
                <div id="lucky-number" class="loading">
                    <div class="spinner"></div>
                    <p>等待数据...</p>
                </div>
            </div>

            <!-- 单双预测 -->
            <div class="card">
                <div class="card-title">单双预测</div>
                <div id="single-double" class="loading">
                    <div class="spinner"></div>
                    <p>等待数据...</p>
                </div>
            </div>

            <!-- 大小预测 -->
            <div class="card">
                <div class="card-title">大小预测</div>
                <div id="big-small" class="loading">
                    <div class="spinner"></div>
                    <p>等待数据...</p>
                </div>
            </div>

            <!-- 双组预测 -->
            <div class="card">
                <div class="card-title">双组预测</div>
                <div id="double-group" class="loading">
                    <div class="spinner"></div>
                    <p>等待数据...</p>
                </div>
            </div>

            <!-- 杀组预测 -->
            <div class="card">
                <div class="card-title">杀组预测</div>
                <div id="kill-group" class="loading">
                    <div class="spinner"></div>
                    <p>等待数据...</p>
                </div>
            </div>

            <!-- 数据统计 -->
            <div class="card">
                <div class="card-title">系统统计</div>
                <div id="system-stats" class="loading">
                    <div class="spinner"></div>
                    <p>计算中...</p>
                </div>
            </div>
        </div>

        <!-- 历史记录 -->
        <div class="card">
            <div class="card-title">最近开奖记录</div>
            <div id="history" class="loading">
                <p>加载中...</p>
            </div>
        </div>
    </div>

    <!-- 引入脚本 -->
    <script src="/database-manager.js"></script>
    <script src="/app.js"></script>
    <script>
        let app = null;

        // HTML转义工具函数 - 防止XSS攻击
        function escapeHtml(text) {
            if (text === null || text === undefined) return '';
            const div = document.createElement('div');
            div.textContent = String(text);
            return div.innerHTML;
        }

        // 安全设置元素内容
        function setHTML(id, html) {
            const el = document.getElementById(id);
            if (el) el.innerHTML = html;
        }

        // 初始化
        document.addEventListener('DOMContentLoaded', async () => {
            console.log('页面加载完成');
            
            app = new PC28FrontendEliteApp();
            
            // 显示网络状态
            updateOnlineStatus();
            window.addEventListener('online', updateOnlineStatus);
            window.addEventListener('offline', updateOnlineStatus);

            // 更新运行时间
            setInterval(() => {
                if (app && app.initializeTime) {
                    const uptime = (Date.now() - app.initializeTime) / 1000;
                    document.getElementById('uptime').textContent = 
                        uptime < 60 ? `${uptime.toFixed(0)}秒` : `${(uptime / 60).toFixed(1)}分`;
                }
            }, 1000);

            // 文件导入监听
            document.getElementById('file-input').addEventListener('change', handleFileImport);

            // 自动初始化
            showMessage('准备就绪，点击"初始化系统"开始', 'info');
        });

        // 按钮操作包装器：添加加载状态和防抖
        async function handleAction(buttonId, action) {
            const button = document.getElementById(`btn-${buttonId}`);
            if (!button) return;

            // 防抖：如果按钮已禁用，说明操作正在进行
            if (button.disabled) return;

            const originalText = button.textContent;
            button.disabled = true;
            button.textContent = `${originalText}...`;

            try {
                const result = await action();
                
                // 根据操作类型显示消息
                if (buttonId === 'init') {
                    if (result.code === 0) {
                        showMessage('系统初始化成功！', 'success');
                    } else {
                        showMessage(`初始化失败：${escapeHtml(result.msg)}`, 'error');
                    }
                } else if (buttonId === 'export') {
                    if (result.code === 0) {
                        showMessage('数据导出成功！', 'success');
                    } else {
                        showMessage(`导出失败：${escapeHtml(result.msg)}`, 'error');
                    }
                } else if (buttonId === 'clear') {
                    if (result.code === 0) {
                        showMessage('所有数据已清空！', 'success');
                        clearUI();
                    } else {
                        showMessage(`清空失败：${escapeHtml(result.msg)}`, 'error');
                    }
                }
            } catch (err) {
                showMessage(`操作出错：${escapeHtml(err.message)}`, 'error');
            } finally {
                button.disabled = false;
                button.textContent = originalText;
            }
        }

        // 清空数据
        async function clearAllData() {
            if (!confirm('确定要清空所有数据吗？此操作不可恢复！')) {
                return { code: 1, msg: '操作已取消' };
            }
            return await app.clearAllData();
        }

        // 文件导入处理
        async function handleFileImport(event) {
            const file = event.target.files[0];
            if (!file) return;

            showMessage('正在导入数据...', 'info');
            const result = await app.importData(file);
            
            if (result.code === 0) {
                showMessage(`导入成功！${escapeHtml(result.msg)}`, 'success');
                await renderHistory();
                await renderStats();
            } else {
                showMessage(`导入失败：${escapeHtml(result.msg)}`, 'error');
            }

            // 重置input以便重复导入同一文件
            event.target.value = '';
        }

        function updateOnlineStatus() {
            const indicator = document.getElementById('online-indicator');
            const status = document.getElementById('online-status');
            
            if (navigator.onLine) {
                indicator.className = 'status-indicator online';
                status.textContent = '在线';
                status.style.color = '#4ade80';
            } else {
                indicator.className = 'status-indicator offline';
                status.textContent = '离线 (本地模式)';
                status.style.color = '#ef4444';
            }
        }

        function showMessage(text, type = 'info') {
            const container = document.getElementById('system-message');
            const className = type === 'error' ? 'error' : type === 'success' ? 'success' : 'info';
            // 使用 escapeHtml 防止消息内容注入
            container.innerHTML = `<div class="info-box ${className}">${escapeHtml(text)}</div>`;
        }

        function renderLuckyNumber(data) {
            if (!data || data.error) {
                setHTML('lucky-number', 
                    `<div class="info-box error">${escapeHtml(data ? data.error : '暂无数据')}</div>`);
                return;
            }

            if (!Array.isArray(data) || data.length === 0) {
                setHTML('lucky-number', '<div class="info-box">暂无预测数据</div>');
                return;
            }

            let html = '<div style="display: flex; flex-wrap: wrap; gap: 10px;">';
            data.slice(0, 5).forEach(pred => {
                const num = escapeHtml(pred.number);
                const score = escapeHtml(pred.score);
                html += `
                    <div style="background: rgba(102, 126, 234, 0.2); padding: 12px; border-radius: 6px; text-align: center;">
                        <div class="number-ball">${String(num).padStart(2, '0')}</div>
                        <div style="color: #60a5fa; font-size: 0.8em; margin-top: 5px;">置信度: ${score}%</div>
                    </div>
                `;
            });
            html += '</div>';
            setHTML('lucky-number', html);
        }

        function renderSingleDouble(data) {
            if (!data || data.error) {
                setHTML('single-double', 
                    `<div class="info-box error">${escapeHtml(data ? data.error : '暂无数据')}</div>`);
                return;
            }

            const predText = data.prediction === 'ODD' ? '单数' : '双数';
            const html = `
                <div class="prediction-row success">
                    <div style="font-size: 1.2em; margin-bottom: 10px;">
                        预测: <span class="highlight">${escapeHtml(predText)}</span>
                    </div>
                    <table>
                        <tr><td>置信度</td><td style="color: #60a5fa;">${escapeHtml(data.confidence)}%</td></tr>
                        <tr><td>单数比例</td><td style="color: #60a5fa;">${escapeHtml(data.oddRatio)}%</td></tr>
                        <tr><td>双数比例</td><td style="color: #60a5fa;">${escapeHtml(data.evenRatio)}%</td></tr>
                        <tr><td>最大连续</td><td style="color: #60a5fa;">${escapeHtml(data.maxConsecutiveOdd)}</td></tr>
                    </table>
                </div>
            `;
            setHTML('single-double', html);
        }

        function renderBigSmall(data) {
            if (!data || data.error) {
                setHTML('big-small', 
                    `<div class="info-box error">${escapeHtml(data ? data.error : '暂无数据')}</div>`);
                return;
            }

            const predText = data.prediction === 'BIG' ? '大' : '小';
            const html = `
                <div class="prediction-row success">
                    <div style="font-size: 1.2em; margin-bottom: 10px;">
                        预测: <span class="highlight">${escapeHtml(predText)}</span>
                    </div>
                    <table>
                        <tr><td>置信度</td><td style="color: #60a5fa;">${escapeHtml(data.confidence)}%</td></tr>
                        <tr><td>大数比例</td><td style="color: #60a5fa;">${escapeHtml(data.bigRatio)}%</td></tr>
                        <tr><td>小数比例</td><td style="color: #60a5fa;">${escapeHtml(data.smallRatio)}%</td></tr>
                    </table>
                </div>
            `;
            setHTML('big-small', html);
        }

        function renderDoubleGroup(data) {
            if (!Array.isArray(data) || data.length === 0) {
                setHTML('double-group', '<div class="info-box error">暂无数据</div>');
                return;
            }

            let html = '<table><tr><th>组合</th><th>频次</th><th>比例</th></tr>';
            const labels = {
                'ODD_SMALL': '单小 (1-13奇)',
                'ODD_BIG': '单大 (15-27奇)',
                'EVEN_SMALL': '双小 (0-12偶)',
                'EVEN_BIG': '双大 (14-26偶)'
            };

            data.forEach(pred => {
                const label = escapeHtml(labels[pred.group] || pred.group);
                const freq = escapeHtml(pred.frequency);
                const ratio = escapeHtml(pred.ratio);
                html += `
                    <tr>
                        <td>${label}</td>
                        <td>${freq}</td>
                        <td style="color: #60a5fa;">${ratio}%</td>
                    </tr>
                `;
            });
            html += '</table>';
            setHTML('double-group', html);
        }

        function renderKillGroup(data) {
            if (!Array.isArray(data) || data.length === 0) {
                setHTML('kill-group', '<div class="info-box error">暂无数据</div>');
                return;
            }

            let html = '<table><tr><th>杀组类型</th><th>未出现期数</th><th>建议置信度</th></tr>';
            const labels = {
                'KILL_ODD': '杀单组',
                'KILL_EVEN': '杀双组',
                'KILL_BIG': '杀大组',
                'KILL_SMALL': '杀小组'
            };

            data.forEach(rec => {
                const label = escapeHtml(labels[rec.group] || rec.group);
                const missing = escapeHtml(rec.missingPeriods);
                const confidence = escapeHtml(rec.confidence);
                html += `
                    <tr>
                        <td>${label}</td>
                        <td>${missing}</td>
                        <td style="color: #60a5fa;">${confidence}%</td>
                    </tr>
                `;
            });
            html += '</table>';
            setHTML('kill-group', html);
        }

        async function renderStats() {
            if (!app) return;
            const stats = await app.getStats();

            const html = `
                <div class="prediction-row">
                    <table>
                        <tr><td>运行时间</td><td style="color: #60a5fa;">${escapeHtml(stats.uptime)}</td></tr>
                        <tr><td>网络状态</td><td style="color: #60a5fa;">${stats.isOnline ? '在线' : '离线'}</td></tr>
                        <tr><td>数据库</td><td style="color: #60a5fa;">
                            ${escapeHtml(stats.dbStats.draws)}条开奖 | 
                            ${escapeHtml(stats.dbStats.predictions)}条预测 | 
                            ${escapeHtml(stats.dbStats.cache)}条缓存
                        </td></tr>
                        <tr><td>已加载预测</td><td style="color: #60a5fa;">${escapeHtml(stats.predictions.join(', ') || '无')}</td></tr>
                    </table>
                </div>
            `;
            setHTML('system-stats', html);
            document.getElementById('db-size').textContent = 
                `${stats.dbStats.draws + stats.dbStats.predictions}条数据`;
            document.getElementById('prediction-count').textContent = `${stats.predictions.length}个`;
        }

        async function renderHistory() {
            if (!app) return;
            const draws = await app.db.getRecentDraws(20);

            if (draws.length === 0) {
                setHTML('history', '<div class="info-box">暂无历史记录</div>');
                return;
            }

            let html = '<table><tr><th>期号</th><th>号码</th><th>时间</th></tr>';
            draws.forEach(draw => {
                const period = escapeHtml(draw.period);
                const num = String(escapeHtml(draw.number)).padStart(2, '0');
                const time = escapeHtml(new Date(draw.timestamp).toLocaleString('zh-CN'));
                html += `
                    <tr>
                        <td>${period}</td>
                        <td><span class="number-ball">${num}</span></td>
                        <td style="font-size: 0.9em;">${time}</td>
                    </tr>
                `;
            });
            html += '</table>';
            setHTML('history', html);
        }

        // 监听预测结果
        window.addEventListener('prediction-update', async (event) => {
            const { predictions } = event.detail || {};
            if (predictions) {
                renderLuckyNumber(predictions.luckyNumber || []);
                renderSingleDouble(predictions.singleDouble || {});
                renderBigSmall(predictions.bigSmall || {});
                renderDoubleGroup(predictions.doubleGroup || []);
                renderKillGroup(predictions.killGroup || []);
            }
            await renderStats();
            await renderHistory();
        });

        // 重写 app.getComprehensivePrediction 以触发事件
        const originalGetPrediction = PC28FrontendEliteApp.prototype.getComprehensivePrediction;
        PC28FrontendEliteApp.prototype.getComprehensivePrediction = async function() {
            const result = await originalGetPrediction.call(this);
            if (result.code === 0) {
                window.dispatchEvent(new CustomEvent('prediction-update', {
                    detail: { predictions: result.data }
                }));
                showMessage('预测完成！', 'success');
            } else {
                showMessage(result.msg, 'error');
            }
            return result;
        };

        // 重写 fetchDrawData 以触发历史更新
        const originalFetch = PC28FrontendEliteApp.prototype.fetchDrawData;
        PC28FrontendEliteApp.prototype.fetchDrawData = async function() {
            showMessage('正在刷新数据...', 'info');
            const result = await originalFetch.call(this);
            if (result.code === 0 && result.data) {
                showMessage('数据刷新成功！' + (result.offline ? ' (离线模式)' : ''), 'success');
                await renderHistory();
            } else if (result.code !== 0) {
                showMessage(result.msg, 'error');
            }
            return result;
        };

        function clearUI() {
            const ids = ['lucky-number', 'single-double', 'big-small', 'double-group', 'kill-group', 'system-stats'];
            ids.forEach(id => {
                setHTML(id, '<div class="loading"><p>等待数据...</p></div>');
            });
        }
    </script>
</body>
</html>
