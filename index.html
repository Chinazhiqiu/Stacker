<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PC28 预测系统</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, 'Segoe UI', sans-serif;
            background: #0f1117;
            color: #d1d5db;
            padding: 16px;
            min-height: 100vh;
        }
        .container { max-width: 960px; margin: 0 auto; }

        /* 顶栏 */
        .topbar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 20px;
        }
        .topbar h1 {
            font-size: 1.3rem;
            font-weight: 600;
            color: #f3f4f6;
        }
        .status-pills {
            display: flex;
            gap: 8px;
        }
        .pill {
            font-size: 0.75rem;
            padding: 4px 10px;
            border-radius: 20px;
            background: #1e2030;
            color: #9ca3af;
        }
        .pill.online { color: #4ade80; }
        .pill.offline { color: #ef4444; }

        /* 控制按钮 */
        .controls {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            margin-bottom: 20px;
        }
        button {
            padding: 8px 16px;
            background: #2a2d3e;
            color: #e5e7eb;
            border: 1px solid #3a3d4e;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.85rem;
            transition: all 0.2s;
        }
        button:hover:not(:disabled) {
            background: #363a4f;
            border-color: #667eea;
        }
        button:disabled { opacity: 0.4; cursor: not-allowed; }
        button.primary {
            background: #667eea;
            border-color: #667eea;
            color: #fff;
        }
        button.primary:hover:not(:disabled) { background: #5568d3; }

        /* 消息条 */
        .msg {
            font-size: 0.8rem;
            padding: 8px 12px;
            border-radius: 6px;
            margin-bottom: 16px;
            display: none;
        }
        .msg.show { display: block; }
        .msg.info { background: #1e3a5f; color: #93c5fd; }
        .msg.success { background: #14352a; color: #4ade80; }
        .msg.error { background: #3b1414; color: #fca5a5; }

        /* 预测卡片区 */
        .pred-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 12px;
            margin-bottom: 20px;
        }
        .card {
            background: #181a24;
            border: 1px solid #2a2d3e;
            border-radius: 8px;
            padding: 16px;
        }
        .card-head {
            font-size: 0.8rem;
            color: #6b7280;
            margin-bottom: 10px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        .card-value {
            font-size: 1.6rem;
            font-weight: 700;
            color: #f3f4f6;
        }
        .card-sub {
            font-size: 0.78rem;
            color: #9ca3af;
            margin-top: 4px;
        }
        .badge {
            display: inline-block;
            font-size: 0.7rem;
            padding: 2px 8px;
            border-radius: 4px;
            margin-left: 6px;
            vertical-align: middle;
        }
        .badge.green { background: #14352a; color: #4ade80; }
        .badge.blue { background: #1e3a5f; color: #93c5fd; }
        .badge.red { background: #3b1414; color: #fca5a5; }

        /* 推荐组合高亮卡 */
        .card.highlight-card {
            background: linear-gradient(135deg, #1e2540, #251e40);
            border-color: #667eea;
        }
        .card.highlight-card .card-head { color: #93c5fd; }
        .card.highlight-card .card-value { color: #a5b4fc; }

        /* 特码球 */
        .balls { display: flex; gap: 8px; flex-wrap: wrap; }
        .ball {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 40px; height: 40px;
            border-radius: 50%;
            background: #2a2d3e;
            font-weight: 700;
            font-size: 0.9rem;
            color: #e5e7eb;
        }
        .ball .pct {
            font-size: 0.55rem;
            color: #6b7280;
            display: block;
            line-height: 1;
            margin-top: 1px;
        }

        /* 历史记录表 */
        .history-card {
            background: #181a24;
            border: 1px solid #2a2d3e;
            border-radius: 8px;
            overflow: hidden;
        }
        .history-card .card-head {
            padding: 12px 16px;
            border-bottom: 1px solid #2a2d3e;
            margin-bottom: 0;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.82rem;
        }
        th {
            text-align: left;
            padding: 8px 12px;
            color: #6b7280;
            font-weight: 500;
            border-bottom: 1px solid #2a2d3e;
        }
        td {
            padding: 8px 12px;
            border-bottom: 1px solid #1e2030;
            color: #d1d5db;
        }
        .num-ball {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 28px; height: 28px;
            border-radius: 50%;
            background: #2a2d3e;
            font-weight: 700;
            font-size: 0.78rem;
        }
        .hit { color: #4ade80; font-weight: 600; }
        .miss { color: #6b7280; }
        .pending { color: #fbbf24; }

        #file-input { display: none; }

        @media (max-width: 600px) {
            .pred-grid { grid-template-columns: 1fr; }
            .topbar { flex-direction: column; gap: 8px; align-items: flex-start; }
        }
    </style>
</head>
<body>
<div class="container">
    <!-- 顶栏 -->
    <div class="topbar">
        <h1>PC28 预测系统</h1>
        <div class="status-pills">
            <span class="pill" id="online-status">检测中</span>
            <span class="pill" id="uptime">0s</span>
            <span class="pill" id="db-size">-</span>
        </div>
    </div>

    <!-- 控制按钮 -->
    <div class="controls">
        <button class="primary" id="btn-init" onclick="handleAction('init', app.initialize.bind(app))">初始化</button>
        <button id="btn-fetch" onclick="handleAction('fetch', app.fetchDrawData.bind(app))">刷新数据</button>
        <button class="primary" id="btn-predict" onclick="handleAction('predict', app.getComprehensivePrediction.bind(app))">获取预测</button>
        <button id="btn-stats" onclick="handleAction('stats', renderStats)">统计</button>
        <button id="btn-export" onclick="handleAction('export', app.exportData.bind(app))">导出</button>
        <button id="btn-import" onclick="document.getElementById('file-input').click()">导入</button>
        <button id="btn-clear" onclick="handleAction('clear', clearAllData)">清空</button>
        <input type="file" id="file-input" accept=".json" />
    </div>

    <!-- 消息 -->
    <div class="msg" id="system-message"></div>

    <!-- 预测卡片 -->
    <div class="pred-grid">
        <!-- 双组推荐（重点高亮） -->
        <div class="card highlight-card">
            <div class="card-head">双组推荐</div>
            <div class="card-value" id="double-group-main">--</div>
            <div class="card-sub" id="double-group-sub">等待预测...</div>
        </div>

        <!-- 单双 -->
        <div class="card">
            <div class="card-head">单双</div>
            <div class="card-value" id="single-double-main">--</div>
            <div class="card-sub" id="single-double-sub">等待预测...</div>
        </div>

        <!-- 大小 -->
        <div class="card">
            <div class="card-head">大小</div>
            <div class="card-value" id="big-small-main">--</div>
            <div class="card-sub" id="big-small-sub">等待预测...</div>
        </div>

        <!-- 特码 -->
        <div class="card">
            <div class="card-head">特码推荐</div>
            <div class="balls" id="lucky-number"><span class="card-sub">等待预测...</span></div>
        </div>
    </div>

    <!-- 历史记录 -->
    <div class="history-card">
        <div class="card-head">最近开奖记录</div>
        <div id="history-table">
            <div style="padding: 20px; text-align: center; color: #6b7280;">加载中...</div>
        </div>
    </div>
</div>

<script src="/database-manager.js"></script>
<script src="/app.js"></script>
<script>
    let app = null;

    function escapeHtml(text) {
        if (text === null || text === undefined) return '';
        const div = document.createElement('div');
        div.textContent = String(text);
        return div.innerHTML;
    }

    document.addEventListener('DOMContentLoaded', async () => {
        app = new PC28FrontendEliteApp();
        updateOnlineStatus();
        window.addEventListener('online', updateOnlineStatus);
        window.addEventListener('offline', updateOnlineStatus);

        setInterval(() => {
            if (app && app.initializeTime) {
                const s = Math.floor((Date.now() - app.initializeTime) / 1000);
                const el = document.getElementById('uptime');
                el.textContent = s < 60 ? `${s}s` : `${Math.floor(s/60)}m${s%60}s`;
            }
        }, 1000);

        document.getElementById('file-input').addEventListener('change', handleFileImport);
        showMessage('点击"初始化"开始', 'info');
    });

    async function handleAction(buttonId, action) {
        const button = document.getElementById(`btn-${buttonId}`);
        if (!button || button.disabled) return;
        const orig = button.textContent;
        button.disabled = true;
        button.textContent = orig + '...';
        try {
            const result = await action();
            if (buttonId === 'init') {
                result.code === 0 ? showMessage('初始化成功', 'success') : showMessage('初始化失败: ' + escapeHtml(result.msg), 'error');
            } else if (buttonId === 'export') {
                result.code === 0 ? showMessage('导出成功', 'success') : showMessage('导出失败: ' + escapeHtml(result.msg), 'error');
            } else if (buttonId === 'clear') {
                result.code === 0 ? showMessage('数据已清空', 'success') : showMessage('清空失败: ' + escapeHtml(result.msg), 'error');
            }
        } catch (err) {
            showMessage('出错: ' + escapeHtml(err.message), 'error');
        } finally {
            button.disabled = false;
            button.textContent = orig;
        }
    }

    async function clearAllData() {
        if (!confirm('确定清空所有数据？不可恢复！')) return { code: 1, msg: '已取消' };
        return await app.clearAllData();
    }

    async function handleFileImport(event) {
        const file = event.target.files[0];
        if (!file) return;
        showMessage('导入中...', 'info');
        const result = await app.importData(file);
        if (result.code === 0) {
            showMessage('导入成功: ' + escapeHtml(result.msg), 'success');
            await renderHistory();
        } else {
            showMessage('导入失败: ' + escapeHtml(result.msg), 'error');
        }
        event.target.value = '';
    }

    function updateOnlineStatus() {
        const el = document.getElementById('online-status');
        if (navigator.onLine) {
            el.textContent = '在线';
            el.className = 'pill online';
        } else {
            el.textContent = '离线';
            el.className = 'pill offline';
        }
    }

    function showMessage(text, type = 'info') {
        const el = document.getElementById('system-message');
        el.className = `msg ${type} show`;
        el.textContent = text;
        clearTimeout(el._timer);
        el._timer = setTimeout(() => el.classList.remove('show'), 5000);
    }

    // ---- 渲染预测结果 ----
    function renderLuckyNumber(data) {
        const el = document.getElementById('lucky-number');
        if (!data || data.error || !Array.isArray(data) || data.length === 0) {
            el.innerHTML = '<span class="card-sub">暂无数据</span>';
            return;
        }
        let html = '';
        data.slice(0, 5).forEach(pred => {
            const num = escapeHtml(pred.number);
            const score = escapeHtml(pred.score);
            html += `<div class="ball">${String(num).padStart(2,'0')}<span class="pct">${score}%</span></div>`;
        });
        el.innerHTML = html;
    }

    function renderSingleDouble(data) {
        const main = document.getElementById('single-double-main');
        const sub = document.getElementById('single-double-sub');
        if (!data || data.error) {
            main.textContent = '--';
            sub.textContent = data ? escapeHtml(data.error) : '暂无数据';
            return;
        }
        const label = data.prediction === 'ODD' ? '单' : '双';
        main.innerHTML = `${escapeHtml(label)} <span class="badge blue">${escapeHtml(data.confidence)}%</span>`;
        sub.textContent = `单${escapeHtml(data.oddRatio)}% / 双${escapeHtml(data.evenRatio)}%`;
    }

    function renderBigSmall(data) {
        const main = document.getElementById('big-small-main');
        const sub = document.getElementById('big-small-sub');
        if (!data || data.error) {
            main.textContent = '--';
            sub.textContent = data ? escapeHtml(data.error) : '暂无数据';
            return;
        }
        const label = data.prediction === 'BIG' ? '大' : '小';
        main.innerHTML = `${escapeHtml(label)} <span class="badge blue">${escapeHtml(data.confidence)}%</span>`;
        sub.textContent = `大${escapeHtml(data.bigRatio)}% / 小${escapeHtml(data.smallRatio)}%`;
    }

    function renderDoubleGroup(data) {
        const main = document.getElementById('double-group-main');
        const sub = document.getElementById('double-group-sub');
        if (!data || data.error) {
            main.textContent = '--';
            sub.textContent = data ? escapeHtml(data.error) : '暂无数据';
            return;
        }

        // 优先显示推荐组合
        if (data.recommendation) {
            const rec = data.recommendation;
            main.innerHTML = `${escapeHtml(rec.label)} <span class="badge green">${escapeHtml(rec.hitRate)}%</span>`;
            sub.textContent = `近${escapeHtml(rec.totalPeriods)}期命中${escapeHtml(rec.combinedCount)}次`;
        } else if (Array.isArray(data) && data.length > 0) {
            // 兼容旧格式
            main.textContent = data[0]?.group || '--';
            sub.textContent = '暂无推荐';
        } else {
            main.textContent = '--';
            sub.textContent = '暂无数据';
        }
    }

    // ---- 渲染历史记录（含命中状态）----
    async function renderHistory() {
        if (!app) return;
        const draws = await app.db.getRecentDraws(20);
        const container = document.getElementById('history-table');

        if (draws.length === 0) {
            container.innerHTML = '<div style="padding:20px;text-align:center;color:#6b7280;">暂无记录</div>';
            return;
        }

        let html = `<table>
            <thead><tr>
                <th>期号</th>
                <th>号码</th>
                <th>单双</th>
                <th>大小</th>
                <th>命中</th>
            </tr></thead><tbody>`;

        draws.forEach(draw => {
            const num = draw.number;
            const isOdd = num % 2 === 1;
            const isBig = num >= 14;
            const period = escapeHtml(draw.period);
            const numStr = String(num).padStart(2, '0');

            // 命中判定
            let hitHtml = '<span class="pending">未预测</span>';
            if (app.lastPrediction) {
                const hit = app.checkPredictionHit(draw);
                if (hit) {
                    const parts = [];
                    if (hit.singleDouble !== null) parts.push(hit.singleDouble ? '单双' : null);
                    if (hit.bigSmall !== null) parts.push(hit.bigSmall ? '大小' : null);
                    if (hit.doubleGroup !== null) parts.push(hit.doubleGroup ? '双组' : null);
                    const hits = parts.filter(p => p !== null);

                    if (hits.length > 0) {
                        hitHtml = `<span class="hit">命中 ${escapeHtml(hits.join('/'))}</span>`;
                    } else {
                        hitHtml = '<span class="miss">未中</span>';
                    }
                }
            }

            html += `<tr>
                <td>${period}</td>
                <td><span class="num-ball">${numStr}</span></td>
                <td>${isOdd ? '单' : '双'}</td>
                <td>${isBig ? '大' : '小'}</td>
                <td>${hitHtml}</td>
            </tr>`;
        });

        html += '</tbody></table>';
        container.innerHTML = html;
    }

    // ---- 渲染统计 ----
    async function renderStats() {
        if (!app) return;
        const stats = await app.getStats();
        document.getElementById('db-size').textContent =
            `${stats.dbStats.draws + stats.dbStats.predictions}条`;
        await renderHistory();
    }

    // ---- 预测完成事件 ----
    window.addEventListener('prediction-update', async (event) => {
        const { predictions } = event.detail || {};
        if (predictions) {
            renderLuckyNumber(predictions.luckyNumber || []);
            renderSingleDouble(predictions.singleDouble || {});
            renderBigSmall(predictions.bigSmall || {});
            renderDoubleGroup(predictions.doubleGroup || {});
        }
        await renderHistory();
        await renderStats();
    });

    // 拦截 getComprehensivePrediction
    const origPred = PC28FrontendEliteApp.prototype.getComprehensivePrediction;
    PC28FrontendEliteApp.prototype.getComprehensivePrediction = async function() {
        const result = await origPred.call(this);
        if (result.code === 0) {
            window.dispatchEvent(new CustomEvent('prediction-update', {
                detail: { predictions: result.data }
            }));
            showMessage('预测完成', 'success');
        } else {
            showMessage(escapeHtml(result.msg), 'error');
        }
        return result;
    };

    // 拦截 fetchDrawData
    const origFetch = PC28FrontendEliteApp.prototype.fetchDrawData;
    PC28FrontendEliteApp.prototype.fetchDrawData = async function() {
        const result = await origFetch.call(this);
        if (result.code === 0 && result.data) {
            showMessage('数据已刷新' + (result.offline ? ' (离线)' : ''), 'success');
            await renderHistory();
        } else if (result.code !== 0) {
            showMessage(escapeHtml(result.msg), 'error');
        }
        return result;
    };
</script>
</body>
</html>
